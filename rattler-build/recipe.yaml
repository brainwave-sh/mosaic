#

context:
  version: "0.1.0"

package:
  name: mosaic
  version: ${{ version }}

source:
  - path: ..

build:
  number: 0
  script: build/build.sh
  dynamic_linking:
    missing_dso_allowlist:
      - if: osx
        then:
          - /usr/lib/swift/libswift*.dylib
requirements:
  build:
    - clangxx>=22.1.0,<23
  host:
    - mojo-compiler==0.26.1
    - if: osx
      then:
        - libcxx
  run:
    - if: osx
      then:
        - ${{ pin_compatible('libcxx') }}

tests:
  - script: |
      for test_file in tests/test_*.mojo; do
        mojo run ${test_file} || exit 1
      done
    files:
      source:
        - tests/**.mojo
        - tests/data/

about:
  homepage: https://mosaiclib.org
  license: Apache-2.0
  license_file: LICENSE
  summary: An image processing library in Mojo
  repository: https://github.com/brainwave-sh/mosaic
  documentation: https://brainwave.sh/mosaic

extra:
  project_name: Mosaic
  maintainers:
    - christianbator
