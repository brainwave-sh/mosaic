#
# pixi.toml
# mosaic
#
# Created by Christian Bator on 03/11/2025
#

[project]
# These should match rattler-build/recipe.yaml > context
version = "0.1.0"

# These should match rattler-build/recipe.yaml > about
homepage = "https://brainwave.sh/mosaic"
license = "Apache-2.0"
license-file = "LICENSE"
description = "An image processing library in Mojo" # This is "summary" in recipe.yaml
repository = "https://github.com/brainwave-sh/mosaic"
documentation = "https://brainwave.sh/mosaic"

# These should match rattler-build/recipe.yaml > extra
name = "mosaic"
authors = ["Christian Bator <christian@bator.co>"]

# These are only defined here
readme = "README.md"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
channels = [
    "https://prefix.dev/max",
    "conda-forge"
]

[dependencies]
mojo = ">=0.26.1,<0.27"
clangxx = ">=22.1.0,<23"

[system-requirements]
macos = "15.0"
linux = "5.15"

[tasks.build]
env = { PREFIX = "$CONDA_PREFIX" }
args = [ { arg = "libraries", default = "" } ]
cmd = "build/build.sh {{ libraries }}"

[tasks.format]
cmd = "mojo format --line-length 140 mosaic tests"

[tasks.test]
depends-on = ["build"]
cmd = """ bash -c '
    for test_file in tests/test_*.mojo; do
        mojo run ${test_file} || exit 1
    done
'
"""

[tasks.package]
cmd = "rattler-build build --recipe rattler-build/recipe.yaml -c https://prefix.dev/max -c conda-forge"
